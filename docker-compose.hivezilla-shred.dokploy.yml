services:
  hivezilla-shred:
    build:
      context: .
      dockerfile: services/hivezilla/Dockerfile.shred
    command:
      - record-shred-udp
      - --config
      - /etc/hivezilla/ingest.json
      - --source-id
      - shred-reader-loopback
      - --journal-id
      - ${SHRED_JOURNAL_ID:?SHRED_JOURNAL_ID must be a stable 32-character hex value}
      - --status-file
      - /status/recorder.json
    network_mode: host
    # Fail closed at the configured spool limit; do not crash-loop against a full journal.
    restart: "no"
    stop_grace_period: 15s
    volumes:
      - hivezilla-shred-data:/data
      - hivezilla-shred-status:/status
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # The NAS initiates an mTLS pull from this listener. ACKs advance replay only;
  # this service never deletes or compacts the Hetzner shred spool.
  hivezilla-shred-pull:
    build:
      context: .
      dockerfile: services/hivezilla/Dockerfile.shred
    entrypoint: ["/usr/local/bin/run-raw-shred-pull-source"]
    network_mode: host
    restart: unless-stopped
    depends_on:
      - hivezilla-shred
    environment:
      SHRED_JOURNAL_ID: ${SHRED_JOURNAL_ID:?SHRED_JOURNAL_ID must be a stable 32-character lowercase hex value}
    volumes:
      - hivezilla-shred-data:/data
      - hivezilla-shred-status:/status:ro
      - hivezilla-shred-control:/control
    secrets:
      - hetzner_pull_source_certificate
      - hetzner_pull_source_private_key
      - pull_client_ca
      - pull_allowed_nodes
      - blockzilla_receipt_public_key
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  shred-status-collector:
    build:
      context: .
      dockerfile: services/hivezilla/Dockerfile.shred-status
    command:
      - --listen
      - 127.0.0.1:18790
      - --hivezilla-status-file
      - /recorder-status/recorder.json
      - --receiver-metrics-url
      - http://127.0.0.1:19090/metrics
      - --output-file
      - /public-status/public.json
      - --cors-origin
      - https://watcher.blockzilla.dev
    network_mode: host
    restart: unless-stopped
    depends_on:
      - hivezilla-shred
    volumes:
      - hivezilla-shred-status:/recorder-status:ro
      - hivezilla-shred-public-status:/public-status
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  shred-status-api:
    image: nginxinc/nginx-unprivileged:1.29-alpine@sha256:0c79d56aee561a1d81c63f00eee5fb5fe29279560cdc55e91425133104c7fbe6
    restart: unless-stopped
    depends_on:
      - shred-status-collector
    expose:
      - "8080"
    volumes:
      - hivezilla-shred-public-status:/status:ro
      - ./services/hivezilla/config/shred-status-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--output-document=-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  hivezilla-shred-data:
  hivezilla-shred-status:
  hivezilla-shred-public-status:
  hivezilla-shred-control:

secrets:
  hetzner_pull_source_certificate:
    file: ${HETZNER_PULL_SOURCE_CERTIFICATE_HOST_FILE:-../files/hetzner-pull-source.crt}
  hetzner_pull_source_private_key:
    file: ${HETZNER_PULL_SOURCE_PRIVATE_KEY_HOST_FILE:-../files/hetzner-pull-source.key}
  pull_client_ca:
    file: ${PULL_CLIENT_CA_HOST_FILE:-../files/pull-client-ca.crt}
  pull_allowed_nodes:
    file: ./deploy/hivezilla-shred/pull-allowed-nodes.json
  blockzilla_receipt_public_key:
    file: ${BLOCKZILLA_RECEIPT_PUBLIC_KEY_HOST_FILE:-../files/blockzilla-receipt.pub}
