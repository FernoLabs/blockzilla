name: ${COMPOSE_PROJECT_NAME:-blockzilla-live}

services:
  raw-recorder:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.raw-recorder
      args:
        RUST_VERSION: "1.96.0"
    image: ${BLOCKZILLA_RAW_IMAGE:-blockzilla-live-recorder:local}
    restart: unless-stopped
    stop_grace_period: 45s

    environment:
      BLOCKZILLA_GRPC_ENDPOINT: "${BLOCKZILLA_GRPC_ENDPOINT:?set the Yellowstone gRPC endpoint}"
      BLOCKZILLA_GRPC_X_TOKEN_FILE: "/run/secrets/grpc_x_token"
      BLOCKZILLA_GRPC_ACCEPT_COMPRESSION: "${BLOCKZILLA_GRPC_ACCEPT_COMPRESSION:-zstd}"
      BLOCKZILLA_GRPC_HTTP2_ADAPTIVE_WINDOW: "${BLOCKZILLA_GRPC_HTTP2_ADAPTIVE_WINDOW:-false}"
      BLOCKZILLA_GRPC_HTTP2_KEEP_ALIVE_INTERVAL_SECS: "${BLOCKZILLA_GRPC_HTTP2_KEEP_ALIVE_INTERVAL_SECS:-30}"
      BLOCKZILLA_GRPC_HTTP2_KEEP_ALIVE_TIMEOUT_SECS: "${BLOCKZILLA_GRPC_HTTP2_KEEP_ALIVE_TIMEOUT_SECS:-10}"
      BLOCKZILLA_GRPC_HTTP2_KEEP_ALIVE_WHILE_IDLE: "${BLOCKZILLA_GRPC_HTTP2_KEEP_ALIVE_WHILE_IDLE:-false}"
      BLOCKZILLA_RAW_CACHE_MODE: "${BLOCKZILLA_RAW_CACHE_MODE:-b2-generations}"
      BLOCKZILLA_RAW_CACHE_ROOT: "${BLOCKZILLA_RAW_CACHE_ROOT:-/data/grpc-cache}"
      BLOCKZILLA_RAW_OUTPUT_DIR: "${BLOCKZILLA_RAW_OUTPUT_DIR:-/data/grpc-cache/active}"
      BLOCKZILLA_RAW_FROM_SLOT: "${BLOCKZILLA_RAW_FROM_SLOT:-}"
      BLOCKZILLA_RAW_MIN_FREE_BYTES: "${BLOCKZILLA_RAW_MIN_FREE_BYTES:-402653184}"
      BLOCKZILLA_RAW_MAX_BLOCKS: "${BLOCKZILLA_RAW_MAX_BLOCKS:-1000000000}"
      BLOCKZILLA_RAW_TIMEOUT_SECS: "${BLOCKZILLA_RAW_TIMEOUT_SECS:-31536000}"
      BLOCKZILLA_RAW_IDLE_TIMEOUT_SECS: "${BLOCKZILLA_RAW_IDLE_TIMEOUT_SECS:-180}"
      BLOCKZILLA_RAW_RESTART_DELAY_SECS: "${BLOCKZILLA_RAW_RESTART_DELAY_SECS:-5}"
      BLOCKZILLA_RAW_LOW_DISK_RECHECK_SECS: "${BLOCKZILLA_RAW_LOW_DISK_RECHECK_SECS:-60}"
      BLOCKZILLA_RAW_COMPRESSION_LEVEL: "${BLOCKZILLA_RAW_COMPRESSION_LEVEL:-1}"
      BLOCKZILLA_RAW_SEGMENT_TARGET_BYTES: "${BLOCKZILLA_RAW_SEGMENT_TARGET_BYTES:-67108864}"
      BLOCKZILLA_RAW_MAX_RECORD_BYTES: "${BLOCKZILLA_RAW_MAX_RECORD_BYTES:-134217728}"
      BLOCKZILLA_RAW_MAX_GENERATION_BYTES: "${BLOCKZILLA_RAW_MAX_GENERATION_BYTES:-402653184}"
      BLOCKZILLA_RAW_GENERATION_BACKLOG_WARN_COUNT: "${BLOCKZILLA_RAW_GENERATION_BACKLOG_WARN_COUNT:-2}"
      BLOCKZILLA_RAW_GENERATION_UPLOAD_RETRY_SECS: "${BLOCKZILLA_RAW_GENERATION_UPLOAD_RETRY_SECS:-60}"
      BLOCKZILLA_RAW_B2_SPILL_START_PERCENT: "${BLOCKZILLA_RAW_B2_SPILL_START_PERCENT:-25}"
      BLOCKZILLA_RAW_B2_SPILL_RECOVERY_PERCENT: "${BLOCKZILLA_RAW_B2_SPILL_RECOVERY_PERCENT:-35}"
      BLOCKZILLA_RAW_REPLAY_RESUME_HEADROOM_SLOTS: "${BLOCKZILLA_RAW_REPLAY_RESUME_HEADROOM_SLOTS:-100}"
      BLOCKZILLA_RAW_GENERATION_UPLOADER_BIN: "/usr/local/bin/blockzilla-s3-upload"
      BLOCKZILLA_RAW_CACHE_RECEIPT_DIR: "${BLOCKZILLA_RAW_CACHE_RECEIPT_DIR:-/data/grpc-cache/receipts}"
      BLOCKZILLA_RAW_OBJECT_STORE: "${BLOCKZILLA_RAW_OBJECT_STORE:-r2}"
      BLOCKZILLA_RAW_OBJECT_STORE_CREDENTIALS_FILE: "${BLOCKZILLA_RAW_OBJECT_STORE_CREDENTIALS_FILE:-/run/secrets/r2_credentials}"
      BLOCKZILLA_RAW_OBJECT_STORE_REMOTE_PREFIX: "${BLOCKZILLA_RAW_OBJECT_STORE_REMOTE_PREFIX:-live-grpc-backup/v1}"
      BLOCKZILLA_R2_USAGE_ALERT_ENABLED: "${BLOCKZILLA_R2_USAGE_ALERT_ENABLED:-true}"
      BLOCKZILLA_R2_USAGE_WARNING_BYTES: "${BLOCKZILLA_R2_USAGE_WARNING_BYTES:-800000000000}"
      BLOCKZILLA_R2_USAGE_CRITICAL_BYTES: "${BLOCKZILLA_R2_USAGE_CRITICAL_BYTES:-950000000000}"
      BLOCKZILLA_R2_USAGE_RECOVERY_HYSTERESIS_BYTES: "${BLOCKZILLA_R2_USAGE_RECOVERY_HYSTERESIS_BYTES:-50000000000}"
      BLOCKZILLA_R2_USAGE_CHECK_INTERVAL_SECS: "${BLOCKZILLA_R2_USAGE_CHECK_INTERVAL_SECS:-3600}"
      # Never enable destructive R2 retention without the signed Blockzilla
      # generation-ACK verifier. Byte pressure or a heartbeat is insufficient.
      BLOCKZILLA_R2_RETENTION_ENABLED: "${BLOCKZILLA_R2_RETENTION_ENABLED:-false}"
      BLOCKZILLA_R2_RETENTION_TRIGGER_BYTES: "${BLOCKZILLA_R2_RETENTION_TRIGGER_BYTES:-950000000000}"
      BLOCKZILLA_R2_RETENTION_TARGET_BYTES: "${BLOCKZILLA_R2_RETENTION_TARGET_BYTES:-900000000000}"
      BLOCKZILLA_R2_RETENTION_MINIMUM_AGE_SECS: "${BLOCKZILLA_R2_RETENTION_MINIMUM_AGE_SECS:-86400}"
      BLOCKZILLA_R2_RETENTION_MINIMUM_RETAINED_GENERATIONS: "${BLOCKZILLA_R2_RETENTION_MINIMUM_RETAINED_GENERATIONS:-2}"
      BLOCKZILLA_R2_RETENTION_CHECK_INTERVAL_SECS: "${BLOCKZILLA_R2_RETENTION_CHECK_INTERVAL_SECS:-3600}"
      # Legacy Backblaze settings remain available for an explicit
      # BLOCKZILLA_RAW_OBJECT_STORE=backblaze rollback.
      BLOCKZILLA_B2_CREDENTIALS_FILE: "/run/secrets/backblaze_credentials"
      BLOCKZILLA_B2_REMOTE_PREFIX: "${BLOCKZILLA_B2_REMOTE_PREFIX:-grpc-raw/v1}"
      BLOCKZILLA_B2_USAGE_ALERT_ENABLED: "${BLOCKZILLA_B2_USAGE_ALERT_ENABLED:-true}"
      BLOCKZILLA_B2_USAGE_ALLOWANCE_BYTES: "${BLOCKZILLA_B2_USAGE_ALLOWANCE_BYTES:-10000000000}"
      BLOCKZILLA_B2_USAGE_WARNING_BYTES: "${BLOCKZILLA_B2_USAGE_WARNING_BYTES:-8000000000}"
      BLOCKZILLA_B2_USAGE_CRITICAL_BYTES: "${BLOCKZILLA_B2_USAGE_CRITICAL_BYTES:-9500000000}"
      BLOCKZILLA_B2_USAGE_RECOVERY_HYSTERESIS_BYTES: "${BLOCKZILLA_B2_USAGE_RECOVERY_HYSTERESIS_BYTES:-500000000}"
      BLOCKZILLA_B2_USAGE_CHECK_INTERVAL_SECS: "${BLOCKZILLA_B2_USAGE_CHECK_INTERVAL_SECS:-3600}"
      BLOCKZILLA_B2_USAGE_OVER_LIMIT_CHECK_INTERVAL_SECS: "${BLOCKZILLA_B2_USAGE_OVER_LIMIT_CHECK_INTERVAL_SECS:-21600}"
      BLOCKZILLA_B2_CAP_RETRY_SECS: "${BLOCKZILLA_B2_CAP_RETRY_SECS:-3600}"
      BLOCKZILLA_RAW_REQUIRE_COMPLETE_POH: "${BLOCKZILLA_RAW_REQUIRE_COMPLETE_POH:-true}"
      BLOCKZILLA_RAW_VOLUME_MARKER: "${BLOCKZILLA_RAW_VOLUME_MARKER:-/data/.blockzilla-raw-volume}"
      BLOCKZILLA_RAW_CLUSTER_ID: "${BLOCKZILLA_RAW_CLUSTER_ID:-solana-mainnet}"
      BLOCKZILLA_RAW_ORIGIN_NODE_ID: "${BLOCKZILLA_RAW_ORIGIN_NODE_ID:-hetzner-dokploy-01}"
      BLOCKZILLA_RAW_SOURCE_ID: "${BLOCKZILLA_RAW_SOURCE_ID:-grpc-raw-hetzner-primary}"
      # Empty bind keeps the downstream relay disabled. The supervisor must add the matching
      # record-grpc-raw CLI flags only when this is non-empty.
      BLOCKZILLA_RAW_RELAY_BIND: "${BLOCKZILLA_RAW_RELAY_BIND:-}"
      BLOCKZILLA_RAW_RELAY_X_TOKEN_FILE: "/run/secrets/grpc_relay_x_token"
      BLOCKZILLA_RAW_RELAY_MAX_RECORDS: "${BLOCKZILLA_RAW_RELAY_MAX_RECORDS:-128}"
      BLOCKZILLA_RAW_RELAY_MAX_ENCODED_BYTES: "${BLOCKZILLA_RAW_RELAY_MAX_ENCODED_BYTES:-134217728}"
      BLOCKZILLA_RAW_RELAY_MAX_CLIENTS: "${BLOCKZILLA_RAW_RELAY_MAX_CLIENTS:-4}"
      BLOCKZILLA_RAW_STALE_AFTER_SECS: "${BLOCKZILLA_RAW_STALE_AFTER_SECS:-180}"
      BLOCKZILLA_RAW_STARTUP_GRACE_SECS: "${BLOCKZILLA_RAW_STARTUP_GRACE_SECS:-300}"
      BLOCKZILLA_TELEGRAM_ENABLED: "${BLOCKZILLA_TELEGRAM_ENABLED:-true}"
      BLOCKZILLA_TELEGRAM_BOT_TOKEN_FILE: "/run/secrets/telegram_bot_token"
      BLOCKZILLA_TELEGRAM_CHAT_ID: "${BLOCKZILLA_TELEGRAM_CHAT_ID:?set the Telegram destination chat ID}"
      BLOCKZILLA_TELEGRAM_MESSAGE_THREAD_ID: "${BLOCKZILLA_TELEGRAM_MESSAGE_THREAD_ID:-}"
      BLOCKZILLA_TELEGRAM_ALERT_COOLDOWN_SECS: "${BLOCKZILLA_TELEGRAM_ALERT_COOLDOWN_SECS:-900}"
      BLOCKZILLA_RAW_DISK_WARN_FREE_BYTES: "${BLOCKZILLA_RAW_DISK_WARN_FREE_BYTES:-805306368}"
      BLOCKZILLA_RAW_DISK_RECOVERY_HYSTERESIS_BYTES: "${BLOCKZILLA_RAW_DISK_RECOVERY_HYSTERESIS_BYTES:-134217728}"
      BLOCKZILLA_RAW_MONITOR_INTERVAL_SECS: "${BLOCKZILLA_RAW_MONITOR_INTERVAL_SECS:-30}"
      # COMPOSE_PROFILES=replication automatically monitors the real ACK WAL.
      # With no active profile the fallback remains empty and produces no false alert.
      BLOCKZILLA_PRIMARY_SYNC_HEARTBEAT_FILE: "${BLOCKZILLA_PRIMARY_SYNC_HEARTBEAT_FILE:-${COMPOSE_PROFILES:+/data/replication-control/cumulative-ack.wal}}"
      BLOCKZILLA_PRIMARY_SYNC_STALE_AFTER_SECS: "${BLOCKZILLA_PRIMARY_SYNC_STALE_AFTER_SECS:-600}"

    volumes:
      - type: volume
        source: raw_data
        target: /data
        volume:
          nocopy: true
    secrets:
      - grpc_x_token
      - grpc_relay_x_token
      - telegram_bot_token
      - r2_credentials
      - backblaze_credentials
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=4m,mode=1777,uid=10001,gid=10001

    # Docker-network metadata only: there is deliberately no host `ports` publication.
    expose:
      - "10001"

    read_only: true
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: ${BLOCKZILLA_RAW_MEMORY_LIMIT:-768m}
    mem_reservation: ${BLOCKZILLA_RAW_MEMORY_RESERVATION:-128m}
    memswap_limit: ${BLOCKZILLA_RAW_MEMORY_LIMIT:-768m}
    deploy:
      resources:
        limits:
          memory: ${BLOCKZILLA_RAW_MEMORY_LIMIT:-768m}
          pids: 64
        reservations:
          memory: ${BLOCKZILLA_RAW_MEMORY_RESERVATION:-128m}

    healthcheck:
      test: ["CMD", "/usr/local/bin/blockzilla-raw-recorder", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5m

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Opt-in durable sender. It reads only fsynced generations from the same
  # cache, sends them to Blockzilla over mTLS, fsyncs the signed cumulative ACK,
  # and is the only process allowed to retire ACK-covered local generations.
  # It deliberately has no dependency on raw-recorder health so it can drain a
  # full/paused recorder. Enable only after the Blockzilla receiver and private
  # route are ready with COMPOSE_PROFILES=replication.
  raw-replicator:
    profiles: ["replication"]
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.raw-recorder
      args:
        RUST_VERSION: "1.96.0"
    image: ${BLOCKZILLA_RAW_IMAGE:-blockzilla-live-recorder:local}
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/blockzilla-raw-replicator"]
    restart: unless-stopped
    stop_grace_period: 45s

    environment:
      BLOCKZILLA_REPLICATION_CONFIG_FILE: /run/secrets/ingest_replica_config
      BLOCKZILLA_REPLICATION_CACHE_ROOT: "${BLOCKZILLA_RAW_CACHE_ROOT:-/data/grpc-cache}"
      BLOCKZILLA_REPLICATION_PRIVATE_KEY_SOURCE: /run/secrets/hetzner_replica_private_key
      BLOCKZILLA_REPLICATION_POLL_INTERVAL_MS: "${BLOCKZILLA_REPLICATION_POLL_INTERVAL_MS:-1000}"

    volumes:
      - type: volume
        source: raw_data
        target: /data
        volume:
          nocopy: true
    secrets:
      - ingest_replica_config
      - blockzilla_primary_ca
      - hetzner_replica_certificate
      - hetzner_replica_private_key
      - blockzilla_receipt_public_key
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=4m,mode=0700,uid=10001,gid=10001

    read_only: true
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: ${BLOCKZILLA_REPLICATION_MEMORY_LIMIT:-768m}
    mem_reservation: ${BLOCKZILLA_REPLICATION_MEMORY_RESERVATION:-128m}
    memswap_limit: ${BLOCKZILLA_REPLICATION_MEMORY_LIMIT:-768m}
    deploy:
      resources:
        limits:
          memory: ${BLOCKZILLA_REPLICATION_MEMORY_LIMIT:-768m}
          pids: 64
        reservations:
          memory: ${BLOCKZILLA_REPLICATION_MEMORY_RESERVATION:-128m}

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  raw_data:
    name: ${BLOCKZILLA_RAW_VOLUME_NAME:-blockzilla-live-raw-data-external}
    external: true

secrets:
  grpc_x_token:
    # Dokploy persists application files beside the generated Compose checkout.
    file: ${BLOCKZILLA_GRPC_X_TOKEN_HOST_FILE:-../files/yellowstone-x-token}
  grpc_relay_x_token:
    # /dev/null keeps a disabled relay deployable without reusing the upstream credential. Set
    # the host-file variable before enabling BLOCKZILLA_RAW_RELAY_BIND.
    file: ${BLOCKZILLA_RAW_RELAY_X_TOKEN_HOST_FILE:-/dev/null}
  telegram_bot_token:
    file: ${BLOCKZILLA_TELEGRAM_BOT_TOKEN_HOST_FILE:-../files/telegram-bot-token}
  r2_credentials:
    file: ${BLOCKZILLA_R2_CREDENTIALS_HOST_FILE:-../files/cloudflare-r2.env}
  backblaze_credentials:
    file: ${BLOCKZILLA_B2_CREDENTIALS_HOST_FILE:-../files/backblaze-blockzilla.env}
  ingest_replica_config:
    file: ${BLOCKZILLA_INGEST_REPLICA_CONFIG_HOST_FILE:-../files/ingest-replica.json}
  blockzilla_primary_ca:
    file: ${BLOCKZILLA_PRIMARY_CA_HOST_FILE:-../files/blockzilla-primary-ca.crt}
  hetzner_replica_certificate:
    file: ${BLOCKZILLA_REPLICA_CERTIFICATE_HOST_FILE:-../files/hetzner-replica.crt}
  hetzner_replica_private_key:
    file: ${BLOCKZILLA_REPLICA_PRIVATE_KEY_HOST_FILE:-../files/hetzner-replica.key}
  blockzilla_receipt_public_key:
    file: ${BLOCKZILLA_RECEIPT_PUBLIC_KEY_HOST_FILE:-../files/blockzilla-receipt.pub}
