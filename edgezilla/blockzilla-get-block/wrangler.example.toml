name = "blockzilla-get-block-local"
main = "build/index.js"
compatibility_date = "2026-05-20"
workers_dev = false

[build]
command = "worker-build --release . --no-default-features --features worker"

[vars]
BZ_ARCHIVE_SOURCE = "r2"
BZ_ARCHIVE_PREFIX = "blockzilla-v2"
BZ_R2_BUCKET_BINDING = "BZ_ARCHIVE_BUCKET"

[[r2_buckets]]
binding = "BZ_ARCHIVE_BUCKET"
bucket_name = "REPLACE_WITH_ARCHIVE_BUCKET"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
