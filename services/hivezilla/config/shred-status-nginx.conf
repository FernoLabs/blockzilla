map $http_origin $shred_status_origin_allowed {
    default 0;
    "" 1;
    "https://watcher.blockzilla.dev" 1;
}

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    access_log off;
    etag off;
    server_tokens off;

    if ($shred_status_origin_allowed = 0) {
        return 403;
    }

    location = /healthz {
        if (!-f /status/public.json) {
            return 503 '{"ok":false}';
        }
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
        return 200 '{"ok":true}';
    }

    location = /api/v1/sidecars/shred-ingest/status.json {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Headers "Accept, Cache-Control" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Origin "https://watcher.blockzilla.dev" always;
            add_header Access-Control-Max-Age "600" always;
            add_header Cache-Control "no-store" always;
            add_header Content-Length "0" always;
            add_header Vary "Origin" always;
            return 204;
        }

        limit_except GET HEAD OPTIONS {
            deny all;
        }

        alias /status/public.json;
        default_type application/json;
        add_header Access-Control-Allow-Origin "https://watcher.blockzilla.dev" always;
        add_header Cache-Control "no-store" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Vary "Origin" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        return 404;
    }
}
