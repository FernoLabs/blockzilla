name: Publish shred-reader image

on:
  push:
    branches:
      - codex/shred-receiver-hardening
    paths:
      - .github/workflows/publish-shred-reader.yml
      - Cargo.lock
      - Cargo.toml
      - services/shred-reader/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-shred-reader-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/fernolabs/blockzilla-shred-reader

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Reclaim runner disk for Agave build
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Bookworm build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/shred-reader/Dockerfile
          target: test
          push: false
          build-args: |
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=shred-reader
          cache-to: type=gha,mode=max,scope=shred-reader

      - name: Build and publish runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/shred-reader/Dockerfile
          target: runtime
          push: true
          build-args: |
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=shred-reader
          cache-to: type=gha,mode=max,scope=shred-reader
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:edge

      - name: Verify published runtime image
        shell: bash
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}:${GITHUB_SHA}"
          docker pull "$image"
          docker run --rm --entrypoint ldd "$image" /usr/local/bin/shred-reader | tee /tmp/ldd.txt
          if grep -q 'not found' /tmp/ldd.txt; then
            exit 1
          fi
          revision="$(docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$image")"
          test "$revision" = "$GITHUB_SHA"
